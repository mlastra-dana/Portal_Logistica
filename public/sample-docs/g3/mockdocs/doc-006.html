<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Guia de facturacion 13437-FT</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f3f5f9;color:#1f2937;margin:0}
    .sheet{max-width:880px;margin:24px auto;background:#fff;border:1px solid #d5dde8;border-radius:12px;padding:24px}
    .brand{font-size:20px;font-weight:800;color:#1f4b93}
    .tag{display:inline-block;background:#eef4ff;color:#1f4b93;border:1px solid #c8d9f7;padding:4px 8px;border-radius:999px;font-size:12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
    .row{padding:10px;border:1px solid #e2e8f0;border-radius:8px;background:#fafcff}
    .k{font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:.08em}
    .v{font-size:15px;font-weight:700;margin-top:4px}
  </style>
</head>
<body>
  <div class="sheet">
    <div class="brand">Portal G3 Logistica</div>
    <p class="tag">Documento demo doc-006</p>
    <h1>Guia de facturacion 13437-FT</h1>
    <div class="grid">
      <div class="row"><div class="k">Cliente</div><div class="v">Farmatodo, C.A.</div></div>
      <div class="row"><div class="k">Fecha</div><div class="v">2026-03-02</div></div>
      <div class="row"><div class="k">Origen</div><div class="v">Caracas</div></div>
      <div class="row"><div class="k">Destino</div><div class="v">Cagua</div></div>
      <div class="row"><div class="k">Estado</div><div class="v">Entregado</div></div>
      <div class="row"><div class="k">Codigo interno</div><div class="v">G3-DOC-006</div></div>
    </div>
  </div>
</body>
</html>
